<!doctype html>
<html>
    <head>
        <!-- SECURITY: Avoid 'unsafe-inline' for scripts. Keep inline styles allowed for now (page has inline <style>). -->
        <meta
            http-equiv="content-security-policy"
            content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https: wss:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
        />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title>Screen and Audio Capture</title>
        <style>
            :root {
                /* Backgrounds */
                --bg-app: #0a0a0a;
                --bg-surface: #111111;
                --bg-elevated: #191919;
                --bg-hover: #1f1f1f;

                /* Text */
                --text-primary: #f5f5f5;
                --text-secondary: #999999;
                --text-muted: #555555;

                /* Borders & Lines */
                --border: #222222;
                --border-strong: #333333;

                /* Accent */
                --accent: #3b82f6;
                --accent-hover: #2563eb;

                /* Status */
                --success: #22c55e;
                --warning: #d4a017;
                --danger: #ef4444;

                /* Typography */
                --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
                --font-mono: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
                --font-size-xs: 11px;
                --font-size-sm: 13px;
                --font-size-base: 14px;
                --font-size-lg: 16px;
                --font-size-xl: 20px;
                --font-size-2xl: 28px;
                --font-weight-normal: 400;
                --font-weight-medium: 500;
                --font-weight-semibold: 600;
                --line-height: 1.6;

                /* Spacing */
                --space-xs: 4px;
                --space-sm: 8px;
                --space-md: 16px;
                --space-lg: 24px;
                --space-xl: 40px;
                --space-2xl: 64px;

                /* Radius */
                --radius-sm: 4px;
                --radius-md: 8px;
                --radius-lg: 12px;

                /* Transitions */
                --transition: 150ms ease;

                /* Sidebar */
                --sidebar-width: 220px;
                --sidebar-width-collapsed: 60px;

                /* Legacy compatibility — mapped to new tokens */
                --background-transparent: transparent;
                --bg-primary: var(--bg-app);
                --bg-secondary: var(--bg-surface);
                --bg-tertiary: var(--bg-elevated);
                --text-color: var(--text-primary);
                --description-color: var(--text-secondary);
                --placeholder-color: var(--text-muted);
                --border-color: var(--border);
                --border-subtle: var(--border);
                --border-default: var(--border-strong);
                --header-background: var(--bg-surface);
                --header-actions-color: var(--text-secondary);
                --main-content-background: var(--bg-app);
                --button-background: transparent;
                --button-border: var(--border-strong);
                --icon-button-color: var(--text-secondary);
                --hover-background: var(--bg-hover);
                --input-background: var(--bg-elevated);
                --input-focus-background: var(--bg-elevated);
                --focus-border-color: var(--accent);
                --focus-box-shadow: transparent;
                --scrollbar-track: var(--bg-app);
                --scrollbar-thumb: var(--border-strong);
                --scrollbar-thumb-hover: #444444;
                --scrollbar-background: var(--bg-app);
                --start-button-background: var(--accent);
                --start-button-color: #ffffff;
                --start-button-border: var(--accent);
                --start-button-hover-background: var(--accent-hover);
                --start-button-hover-border: var(--accent-hover);
                --text-input-button-background: var(--accent);
                --text-input-button-hover: var(--accent-hover);
                --link-color: var(--accent);
                --key-background: var(--bg-elevated);
                --success-color: var(--success);
                --warning-color: var(--warning);
                --error-color: var(--danger);
                --danger-color: var(--danger);
                --preview-video-background: var(--bg-surface);
                --preview-video-border: var(--border);
                --option-label-color: var(--text-primary);
                --screen-option-background: var(--bg-surface);
                --screen-option-hover-background: var(--bg-elevated);
                --screen-option-selected-background: var(--bg-hover);
                --screen-option-text: var(--text-secondary);

                /* Layout-specific */
                --header-padding: 8px 16px;
                --header-font-size: 14px;
                --header-gap: 8px;
                --header-button-padding: 6px 12px;
                --header-icon-padding: 6px;
                --header-font-size-small: 12px;
                --main-content-padding: 16px;
                --main-content-margin-top: 0;
                --icon-size: 18px;
                --border-radius: var(--radius-sm);
                --content-border-radius: 0;
            }

            html {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
                border-radius: 12px;
                background: transparent;
            }

            body {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
                background: var(--bg-app);
                color: var(--text-primary);
                line-height: var(--line-height);
                border-radius: 12px;
                border: 1px solid var(--border);
                font-family: var(--font);
                font-size: var(--font-size-base);
                font-weight: var(--font-weight-normal);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            * {
                box-sizing: border-box;
            }

            :focus-visible {
                outline: 2px solid var(--accent);
                outline-offset: 2px;
            }

            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }

            ::-webkit-scrollbar-track {
                background: transparent;
            }

            ::-webkit-scrollbar-thumb {
                background: var(--border-strong);
                border-radius: 3px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: #444444;
            }

            secret-sauce-app {
                display: block;
                width: 100%;
                height: 100%;
            }

            /* Confidence Meter */
            .confidence-container {
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 3px;
                background: rgba(255, 255, 255, 0.05);
                z-index: 100;
                overflow: hidden;
            }

            .confidence-bar {
                height: 100%;
                width: 0%;
                background: var(--accent);
                transition:
                    width 0.5s ease,
                    background 0.5s ease;
            }

            /* Summary View */
            .summary-view {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 90%;
                max-width: 500px;
                max-height: 80%;
                background: var(--bg-surface);
                border: 1px solid var(--border-strong);
                border-radius: var(--radius-lg);
                padding: var(--space-lg);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                z-index: 1000;
                overflow-y: auto;
                display: none;
            }

            .summary-view.visible {
                display: block;
                animation: fadeIn 0.3s ease;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translate(-50%, -45%);
                }
                to {
                    opacity: 1;
                    transform: translate(-50%, -50%);
                }
            }
        </style>
    </head>
    <body>
        <script src="../assets/vendor/marked-4.3.0.min.js"></script>
        <script src="../assets/vendor/highlight-11.9.0.min.js"></script>
        <link rel="stylesheet" href="../assets/vendor/highlight-vscode-dark.min.css" />
        <script type="module" src="components/app/SecretSauceApp.js"></script>

        <secret-sauce-app id="secretSauce"></secret-sauce-app>

        <div id="confidenceMeter" class="confidence-container">
            <div class="confidence-bar"></div>
        </div>

        <div id="summaryModal" class="summary-view">
            <h2 style="margin-top: 0; font-size: 1.2rem; color: var(--accent)">Meeting Summary</h2>
            <div id="summaryContent"></div>
            <button
                id="closeSummaryBtn"
                style="
                    margin-top: 20px;
                    padding: 8px 16px;
                    background: var(--bg-hover);
                    border: 1px solid var(--border);
                    border-radius: 4px;
                    color: var(--text-primary);
                    cursor: pointer;
                "
            >
                Close
            </button>
        </div>

        <script src="renderer.js"></script>
    </body>
</html>
